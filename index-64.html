<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉroticaX - Contenu Adulte Premium</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        :root {
            --bg: #0a0a0a;
            --accent: #ff2d95;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: #eee;
            line-height: 1.5;
            overflow-x: hidden;
        }
        
        header {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            z-index: 1000;
            border-bottom: 1px solid #333;
        }
        
        nav {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
            text-decoration: none;
        }
        
        .nav-links a {
            color: #ddd;
            text-decoration: none;
            margin-left: 2rem;
            font-weight: 500;
        }
        
        .nav-links a:hover { color: var(--accent); }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
                order: 3;
            }
            .nav-links {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: #0a0a0a;
                border-bottom: 1px solid #333;
                flex-direction: column;
                padding: 10px 0;
            }
            .nav-links.open {
                display: flex;
            }
            .nav-links a {
                margin: 0;
                padding: 14px 2rem;
                border-bottom: 1px solid #1a1a1a;
            }
            nav {
                flex-wrap: wrap;
                position: relative;
            }
            #auth-btn {
                order: 2;
            }
        }

        #auth-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.3s;
            white-space: nowrap;
        }

        #auth-btn:hover {
            background: #e0247f;
        }
        
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)), url('https://picsum.photos/id/1015/1920/1080') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }
        
        .hero h1 {
            font-size: 4.5rem;
            background: linear-gradient(90deg, #ff2d95, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .btn {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 16px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
        }
        
        .categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .videos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
        }

        .video-card {
            cursor: pointer;
        }

        .video-card .thumbnail {
            width: 100%;
            height: 140px;
        }

        .video-info-block {
            padding: 10px 2px;
        }

        .video-info-block h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-info-block .meta {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #888;
            font-size: 12px;
        }

        .video-info-block .meta svg {
            width: 12px;
            height: 12px;
            fill: #888;
        }

        .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 44px;
            height: 44px;
        }

        .play-overlay svg {
            width: 100%;
            height: 100%;
        }
        
        .cat-card, .video-card {
            border-radius: 12px;
            overflow: hidden;
            background: #1a1a1a;
        }
        
        .thumbnail {
            height: 180px;
            background-size: cover;
            position: relative;
            transition: filter 0.3s;
            border-radius: 10px;
            overflow: hidden;
        }

        .cat-thumbnail {
            height: 140px;
        }
        
        .age-warning {
            background: #ff4444;
            color: white;
            text-align: center;
            padding: 15px;
            position: fixed;
            bottom: 0;
            width: 100%;
            z-index: 9999;
        }

        .video-card {
            cursor: pointer;
        }

        #video-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #video-modal.active {
            display: flex;
        }

        #video-modal video {
            max-width: 95%;
            max-height: 80vh;
            border-radius: 10px;
            display: block;
        }

        .player-wrapper {
            position: relative;
            max-width: 95%;
            max-height: 80vh;
            border-radius: 10px;
            overflow: hidden;
        }

        .custom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 16px 12px;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 60%, transparent 100%);
            box-sizing: border-box;
        }

        .ctrl-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            opacity: 0.9;
            transition: opacity 0.2s;
        }

        .ctrl-btn:hover { opacity: 1; }

        .ctrl-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        #progress-bar {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 4px;
            border-radius: 2px;
            background: rgba(255,255,255,0.3);
            outline: none;
            cursor: pointer;
        }

        #progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 13px;
            height: 13px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            box-shadow: 0 0 4px rgba(0,0,0,0.5);
        }

        #progress-bar::-moz-range-thumb {
            width: 13px;
            height: 13px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            cursor: pointer;
        }

        #time-display {
            color: #ddd;
            font-size: 12px;
            white-space: nowrap;
            min-width: 82px;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        #video-modal h3 {
            color: white;
            margin-top: 15px;
            font-size: 1.2rem;
        }

        #video-modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 2rem;
            color: white;
            cursor: pointer;
            background: none;
            border: none;
        }

        #video-modal-message {
            color: #ccc;
            margin-top: 15px;
            text-align: center;
            padding: 0 20px;
        }
    </style>
</head>
<body>
    <div class="age-warning">⚠️ 18+ UNIQUEMENT - Contenu sexuellement explicite</div>

    <!-- Lecteur vidéo modal -->
    <div id="video-modal">
        <button id="video-modal-close" onclick="closeVideoModal()">✕</button>
        <div class="player-wrapper" id="player-wrapper">
            <video id="video-player" playsinline></video>
            <div class="custom-controls" id="custom-controls">
                <button class="ctrl-btn" id="play-pause-btn">
                    <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pause-icon" viewBox="0 0 24 24" style="display:none;"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
                </button>
                <span id="time-display">0:00 / 0:00</span>
                <input type="range" id="progress-bar" min="0" max="100" value="0" step="0.1">
                <button class="ctrl-btn" id="volume-btn">
                    <svg id="volume-icon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3z"/><path d="M16.5 12c0-1.77-.77-3.29-2-4.24v8.48c1.23-.95 2-2.47 2-4.24z"/></svg>
                    <svg id="mute-icon" viewBox="0 0 24 24" style="display:none;"><path d="M3 9v6h4l5 5V4L7 9H3z"/><path d="M19 6.41L17.59 5 15 7.59 12.41 5 11 6.41 13.59 9 11 11.59 12.41 13 15 10.41 17.59 13 19 11.59 16.41 9z"/></svg>
                </button>
                <button class="ctrl-btn" id="fullscreen-btn">
                    <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                </button>
            </div>
        </div>
        <p id="video-modal-message" style="display:none;"></p>
        <h3 id="video-modal-title"></h3>
    </div>

    <header>
        <nav>
            <a href="#" class="logo" id="site-logo-link">ÉROTICAX</a>
            <div class="nav-links" id="nav-links">
                <a href="#">Accueil</a>
                <a href="videos.html">Vidéos</a>
                <a href="#" onclick="showLiveMessage(event)">Live</a>
                <a href="#categories-section">Catégories</a>
                <a href="#" onclick="requirePremiumLogin(event)">Premium</a>
            </div>
            <button id="auth-btn">Se connecter</button>
            <button class="menu-toggle" id="menu-toggle" aria-label="Menu">☰</button>
        </nav>
    </header>

    <section class="hero" id="hero-section">
        <div style="max-width:800px; text-align:center;">
            <h1 id="hero-title">Le Plaisir Sans Limites</h1>
            <p id="hero-subtitle">Des milliers de vidéos HD, lives interactifs et contenu exclusif.</p>
            <a href="videos.html" class="btn" id="hero-button">Accéder au contenu</a>
        </div>
    </section>

    <section id="categories-section" style="scroll-margin-top: 90px;">
        <h2 style="text-align:center; margin:3rem 0;">Catégories Populaires</h2>
        <div class="categories" id="categories-container"></div>
    </section>

    <section style="background:#111;">
        <h2 style="text-align:center; margin:3rem 0;">Vidéos Tendances</h2>
        <div class="videos" id="videos-container"></div>
    </section>

    <footer style="text-align:center; padding:60px 20px; background:#050505;">
        <p id="footer-text">© 2026 ÉroticaX - Démo Firebase</p>
    </footer>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-analytics-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAHYC3iV3Rl5UkA-fHfLNjoJoMi3JKChyM",
            authDomain: "video-512e3.firebaseapp.com",
            projectId: "video-512e3",
            storageBucket: "video-512e3.firebasestorage.app",
            messagingSenderId: "933879423406",
            appId: "1:933879423406:web:b424d32be335b89a86683f",
            measurementId: "G-62DGZG2TH3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const analytics = firebase.analytics();

        const authBtn = document.getElementById('auth-btn');
        const googleProvider = new firebase.auth.GoogleAuthProvider();
        const menuToggle = document.getElementById('menu-toggle');
        const navLinks = document.getElementById('nav-links');

        menuToggle.onclick = () => {
            navLinks.classList.toggle('open');
        };

        // Ferme le menu mobile après avoir cliqué un lien
        navLinks.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => navLinks.classList.remove('open'));
        });

        function showLiveMessage(e) {
            e.preventDefault();
            alert("La fonctionnalité Live arrive bientôt !");
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                authBtn.textContent = "★ Premium";
                authBtn.title = "Cliquer pour se déconnecter";
                authBtn.onclick = () => auth.signOut();
            } else {
                authBtn.textContent = "Se connecter";
                authBtn.onclick = () => requirePremiumLogin();
            }
            loadVideos();
        });

        function requirePremiumLogin(e) {
            if (e) e.preventDefault();

            if (auth.currentUser) {
                alert("Vous avez déjà accès au contenu Premium !");
                return;
            }

            auth.signInWithPopup(googleProvider)
                .then(result => {
                    alert("Connecté avec " + result.user.displayName + " — Accès Premium activé !");
                })
                .catch(err => {
                    console.error(err);
                    alert("Connexion annulée ou échouée : " + err.message);
                });
        }

        async function loadVideos() {
            const container = document.getElementById('videos-container');
            const isLoggedIn = !!auth.currentUser;
            try {
                const snap = await db.collection('videos').orderBy('views', 'desc').limit(6).get();
                container.innerHTML = '';
                snap.forEach(doc => {
                    const v = doc.data();
                    const locked = v.isPremium && !isLoggedIn;
                    const cardClick = locked 
                        ? `requirePremiumLogin()` 
                        : `playVideo(${JSON.stringify(v.videoUrl || '')}, ${JSON.stringify(v.title || '')})`;
                    container.innerHTML += `
                        <div class="video-card" onclick='${cardClick}'>
                            <div class="thumbnail" style="background:url('${v.thumbnail || "https://picsum.photos/id/1015/600/400"}') center/cover; ${locked ? 'filter:blur(8px) brightness(0.5);' : ''}">
                                ${v.isPremium ? `<span style="position:absolute; top:8px; right:8px; background:#ff2d95; color:white; font-size:10px; padding:3px 8px; border-radius:20px; font-weight:600; z-index:2;">★ PREMIUM</span>` : ''}
                                <div class="play-overlay">
                                    <svg viewBox="0 0 44 44"><circle cx="22" cy="22" r="20" fill="rgba(0,0,0,0.45)" stroke="white" stroke-width="1.5"/><path d="M18 14l14 8-14 8V14z" fill="white"/></svg>
                                </div>
                            </div>
                            <div class="video-info-block">
                                <h3>${locked ? '🔒 Contenu réservé Premium' : v.title}</h3>
                                <p class="meta">
                                    ${locked ? 'Connectez-vous pour débloquer' : `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> ${v.duration || ''} • ${Math.floor((v.views||0)/1000)}k vues`}
                                </p>
                                ${locked ? `<button onclick="event.stopPropagation(); requirePremiumLogin()" style="margin-top:8px; background:var(--accent); color:white; border:none; padding:6px 12px; border-radius:20px; cursor:pointer; font-weight:600; font-size:12px;">Débloquer</button>` : ''}
                            </div>
                        </div>
                    `;
                });
            } catch(e) { console.error(e); }
        }

        function formatTime(sec) {
            if (isNaN(sec) || sec === Infinity) return "0:00";
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        const videoPlayerEl = document.getElementById('video-player');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const progressBarEl = document.getElementById('progress-bar');
        const timeDisplayEl = document.getElementById('time-display');
        const volumeBtn = document.getElementById('volume-btn');
        const volumeIcon = document.getElementById('volume-icon');
        const muteIcon = document.getElementById('mute-icon');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const playerWrapperEl = document.getElementById('player-wrapper');

        videoPlayerEl.addEventListener('play', () => {
            playIcon.style.display = 'none';
            pauseIcon.style.display = 'block';
        });
        videoPlayerEl.addEventListener('pause', () => {
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
        });
        videoPlayerEl.addEventListener('timeupdate', () => {
            if (videoPlayerEl.duration) {
                progressBarEl.value = (videoPlayerEl.currentTime / videoPlayerEl.duration) * 100;
                timeDisplayEl.textContent = `${formatTime(videoPlayerEl.currentTime)} / ${formatTime(videoPlayerEl.duration)}`;
            }
        });

        playPauseBtn.onclick = () => {
            if (videoPlayerEl.paused) videoPlayerEl.play(); else videoPlayerEl.pause();
        };

        progressBarEl.oninput = () => {
            if (videoPlayerEl.duration) {
                videoPlayerEl.currentTime = (progressBarEl.value / 100) * videoPlayerEl.duration;
            }
        };

        volumeBtn.onclick = () => {
            videoPlayerEl.muted = !videoPlayerEl.muted;
            volumeIcon.style.display = videoPlayerEl.muted ? 'none' : 'block';
            muteIcon.style.display = videoPlayerEl.muted ? 'block' : 'none';
        };

        fullscreenBtn.onclick = () => {
            if (playerWrapperEl.requestFullscreen) playerWrapperEl.requestFullscreen();
            else if (playerWrapperEl.webkitRequestFullscreen) playerWrapperEl.webkitRequestFullscreen();
        };

        function playVideo(url, title) {
            const modal = document.getElementById('video-modal');
            const player = videoPlayerEl;
            const message = document.getElementById('video-modal-message');
            const titleEl = document.getElementById('video-modal-title');

            titleEl.textContent = title || '';

            if (url) {
                player.style.display = 'block';
                document.getElementById('custom-controls').style.display = 'flex';
                message.style.display = 'none';
                player.src = url;
                progressBarEl.value = 0;
                timeDisplayEl.textContent = '0:00 / 0:00';
                player.play().catch(() => {});
            } else {
                player.style.display = 'none';
                document.getElementById('custom-controls').style.display = 'none';
                message.style.display = 'block';
                message.textContent = "Aucune vidéo n'a encore été associée à ce contenu.";
            }

            modal.classList.add('active');
        }

        function closeVideoModal() {
            const modal = document.getElementById('video-modal');
            videoPlayerEl.pause();
            videoPlayerEl.src = '';
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
            modal.classList.remove('active');
        }

        async function loadSiteSettings() {
            try {
                const doc = await db.collection('settings').doc('site').get();
                if (doc.exists) {
                    const data = doc.data();
                    if (data.heroImage) {
                        const heroSection = document.getElementById('hero-section');
                        heroSection.style.background = `linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)), url('${data.heroImage}') center/cover no-repeat`;
                    }
                    if (data.logoImage) {
                        const logoEl = document.getElementById('site-logo-link');
                        logoEl.innerHTML = `<img src="${data.logoImage}" alt="Logo" style="height:40px; vertical-align:middle;">`;
                    }
                    if (data.heroTitle) {
                        document.getElementById('hero-title').textContent = data.heroTitle;
                    }
                    if (data.heroSubtitle) {
                        document.getElementById('hero-subtitle').textContent = data.heroSubtitle;
                    }
                    if (data.heroButtonText) {
                        document.getElementById('hero-button').textContent = data.heroButtonText;
                    }
                    if (data.footerText) {
                        document.getElementById('footer-text').textContent = data.footerText;
                    }
                }
            } catch(e) { console.error("Erreur chargement paramètres :", e); }
        }

        async function loadCategories() {
            const container = document.getElementById('categories-container');
            try {
                const snap = await db.collection('categories').get();
                if (snap.empty) {
                    container.innerHTML = '<p style="text-align:center; color:#888; grid-column:1/-1;">Aucune catégorie pour le moment.</p>';
                    return;
                }
                const cats = [];
                snap.forEach(doc => cats.push(doc.data().name));
                cats.sort((a, b) => a.localeCompare(b));

                container.innerHTML = '';
                cats.forEach(name => {
                    container.innerHTML += `
                        <div class="cat-card" style="cursor:pointer;" onclick="window.location.href='videos.html?cat=${encodeURIComponent(name)}'">
                            <div class="cat-thumbnail" style="background:linear-gradient(135deg, #ff2d95, #1a1a1a);"></div>
                            <div style="padding:15px; text-align:center;">
                                <h3>${name}</h3>
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                console.error(e);
            }
        }

        // Chargement initial
        window.onload = () => {
            loadVideos();
            loadSiteSettings();
            loadCategories();
            console.log("%cÉroticaX + Firebase chargé", "color:#ff2d95;font-size:14px");
        };
    </script>
</body>
</html>
